name: Close inactive issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    if: ${{ github.repository == 'TheWidlarzGroup/react-native-video' || github.repository == 'moskalakamil/react-native-video' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: "This issue is stale because it has been open for 30 days with no activity. It will be closed in 14 days if there is no further activity."
          close-issue-message: "This issue was closed because it has been inactive for 14 days since being marked as stale."
          exempt-issue-labels: "good first issue,pinned,Accepted"
          days-before-pr-stale: -1
          days-before-pr-close: -1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
